

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka1:
    image: apache/kafka:3.7.0
    container_name: kafka1
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    volumes:
      - ./config/broker1.properties:/opt/kafka/config/server.properties
      - ./certs:/opt/kafka/certs
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

  kafka2:
    image: apache/kafka:3.7.0
    container_name: kafka2
    depends_on:
      - zookeeper
    ports:
      - "9094:9094"
    volumes:
      - ./config/broker2.properties:/opt/kafka/config/server.properties
      - ./certs:/opt/kafka/certs
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

  kafka3:
    image: apache/kafka:3.7.0
    container_name: kafka3
    depends_on:
      - zookeeper
    ports:
      - "9095:9095"
    volumes:
      - ./config/broker3.properties:/opt/kafka/config/server.properties
      - ./certs:/opt/kafka/certs
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
